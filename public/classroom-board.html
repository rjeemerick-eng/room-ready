<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Room Ready – Classroom Status</title>
  <style>
    /* Rock Church brand: Black bg, Tan accents, Helvetica Neue */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:  #000000;
      --white:  #ffffff;
      --tan:    #C5B99A;
      --navy:   #1C4B91;
      --green:  #046C38;
      --red:    #C13B50;
      --yellow: #F8C539;
      --orange: #E87734;
    }

    body {
      background: var(--black);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      color: var(--white);
    }

    /* ── Logo / Header ── */
    .header {
      width: 100%;
      max-width: 820px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    /* SVG mountain icon — Rock Church mark */
    .logo-icon svg {
      width: 44px;
      height: 44px;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }
    .logo-text .org {
      font-size: 0.7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--tan);
      font-weight: 400;
    }
    .logo-text .name {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .header-right {
      text-align: right;
    }
    .header-right .label {
      font-size: 0.65rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--tan);
      margin-bottom: 4px;
    }
    .header-right .clock {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 2px;
      font-variant-numeric: tabular-nums;
    }
    .header-right .date-str {
      font-size: 0.7rem;
      color: #888;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* ── Divider ── */
    .divider {
      width: 100%;
      max-width: 820px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--tan), transparent);
      margin-bottom: 28px;
    }

    /* ── Table ── */
    .board {
      width: 100%;
      max-width: 820px;
    }

    .col-headers {
      display: grid;
      grid-template-columns: 110px 1fr 200px 110px;
      gap: 12px;
      padding: 0 16px 10px;
      font-size: 0.6rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--tan);
      border-bottom: 1px solid #222;
    }

    .rows { display: flex; flex-direction: column; gap: 2px; margin-top: 6px; }

    .row {
      display: grid;
      grid-template-columns: 110px 1fr 200px 110px;
      gap: 12px;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid #111;
      transition: background 0.15s;
    }
    .row:hover { background: #0d0d0d; }

    .cell {
      font-size: 0.95rem;
      font-weight: 400;
      letter-spacing: 0.5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cell.name { font-weight: 600; }
    .cell.age { color: #aaa; font-size: 0.82rem; }
    .cell.floor { color: #666; font-size: 0.78rem; letter-spacing: 1px; text-transform: uppercase; }

    /* ── Status badges ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px 4px 8px;
      border-radius: 3px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .badge::before {
      content: '';
      display: block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }
    .badge.open {
      background: rgba(4, 108, 56, 0.2);
      color: #3dbd7a;
      border: 1px solid rgba(4, 108, 56, 0.5);
    }
    .badge.open::before { background: #3dbd7a; box-shadow: 0 0 4px #3dbd7a; }

    .badge.closed {
      background: rgba(193, 59, 80, 0.15);
      color: #e06070;
      border: 1px solid rgba(193, 59, 80, 0.4);
    }
    .badge.closed::before { background: #e06070; }

    .badge.full {
      background: rgba(248, 197, 57, 0.15);
      color: #f8c539;
      border: 1px solid rgba(248, 197, 57, 0.4);
    }
    .badge.full::before { background: #f8c539; box-shadow: 0 0 4px #f8c539; }

    /* ── Footer ── */
    .footer {
      width: 100%;
      max-width: 820px;
      margin-top: 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 16px;
      border-top: 1px solid #1a1a1a;
    }
    .footer .tagline {
      font-size: 0.62rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #444;
    }
    .footer .open-count {
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--tan);
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">
        <img id="board-logo" src="/default-logo.png" alt="Logo"
          style="width:48px;height:48px;object-fit:contain;display:block;"/>
      </div>
      <div class="logo-text">
        <span class="org">Rock Church</span>
        <span class="name">Rock Kids</span>
      </div>
    </div>
    <div class="header-right">
      <div class="label">Current Time</div>
      <div class="clock" id="clock">--:--</div>
      <div class="date-str" id="date-str">--</div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Board -->
  <div class="board">
    <div class="col-headers">
      <span>Status</span>
      <span>Classroom</span>
      <span>Age Group</span>
      <span>Location</span>
    </div>
    <div class="rows" id="rows"></div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span class="tagline" id="service-label">Sunday Service · Classroom Availability</span>
    <span class="open-count" id="open-count"></span>
  </div>

<script>
  let cfg = {};
  let refreshTimer = null;

  // Escape untrusted strings before putting them in innerHTML. Room names,
  // ages, etc. can be written by any device on the network (and later pulled
  // from Planning Center), so treat them as hostile.
  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, ch => (
      { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
  }

  // Google Fonts loaded by their CSS family name (matching what settings saves)
  const GOOGLE_FONTS = {
    'Inter':            'https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap',
    'Oswald':           'https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap',
    'Montserrat':       'https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap',
    'Playfair Display': 'https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap',
  };
  const loadedFonts = new Set();

  function applyConfig(c) {
    cfg = c;
    // Names
    if (c.ministryName) document.querySelector('.logo-text .name').textContent = c.ministryName;
    if (c.churchName)   document.querySelector('.logo-text .org').textContent  = c.churchName;
    if (c.serviceLabel) document.getElementById('service-label').textContent   = c.serviceLabel + ' · Classroom Availability';

    // Background color
    if (c.bgColor) document.body.style.background = c.bgColor;

    // Font family — works for Google Fonts and any system/Font Book font
    if (c.fontFamily && c.fontFamily.trim()) {
      const name = c.fontFamily.trim();
      // Lazy-load Google Font stylesheet if this is one of the known web fonts
      if (GOOGLE_FONTS[name] && !loadedFonts.has(name)) {
        const link = document.createElement('link');
        link.rel  = 'stylesheet';
        link.href = GOOGLE_FONTS[name];
        document.head.appendChild(link);
        loadedFonts.add(name);
      }
      // Apply: quote the name so multi-word families work, fall back gracefully
      const isSerif = /serif/i.test(name) || name === 'Georgia' || name === 'Playfair Display';
      document.body.style.fontFamily = `'${name}', ${isSerif ? 'Georgia, serif' : "'Helvetica Neue', Arial, sans-serif"}`;
    } else {
      document.body.style.fontFamily = "'Helvetica Neue', Helvetica, Arial, sans-serif";
    }

    // Colors via CSS vars
    const root = document.documentElement;
    if (c.accentColor) root.style.setProperty('--tan', c.accentColor);
    if (c.openColor)   {
      root.style.setProperty('--open-color', c.openColor);
      // Inject dynamic badge styles
      let styleEl = document.getElementById('dynamic-styles');
      if (!styleEl) { styleEl = document.createElement('style'); styleEl.id = 'dynamic-styles'; document.head.appendChild(styleEl); }
      styleEl.textContent = `
        .badge.open  { background: ${hexAlpha(c.openColor,0.2)}; color: ${c.openColor}; border-color: ${hexAlpha(c.openColor,0.5)}; }
        .badge.open::before { background: ${c.openColor}; box-shadow: 0 0 4px ${c.openColor}; }
        .badge.closed { background: ${hexAlpha(c.closedColor||'#e06070',0.15)}; color: ${c.closedColor||'#e06070'}; border-color: ${hexAlpha(c.closedColor||'#e06070',0.4)}; }
        .badge.closed::before { background: ${c.closedColor||'#e06070'}; }
      `;
    }

    // Column visibility — rebuild column headers
    rebuildHeaders(c);

    // Restart refresh timer
    if (refreshTimer) clearInterval(refreshTimer);
    const interval = (c.refreshInterval || 2) * 1000;
    refreshTimer = setInterval(fetchStatus, interval);
  }

  function hexAlpha(hex, alpha) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${alpha})`;
  }

  function rebuildHeaders(c) {
    const showAge      = c.showAgeGroup !== false;
    const showFloor    = c.showFloor    !== false;
    const showCapacity = !!c.showCapacity;

    let cols = '110px 1fr';
    if (showAge)      cols += ' 200px';
    if (showCapacity) cols += ' 90px';
    if (showFloor)    cols += ' 110px';

    document.querySelectorAll('.col-headers, .row').forEach(el => {
      el.style.gridTemplateColumns = cols;
    });

    const hdr = document.querySelector('.col-headers');
    hdr.innerHTML = `
      <span>Status</span>
      <span>Classroom</span>
      ${showAge      ? '<span>Age Group</span>'  : ''}
      ${showCapacity ? '<span>Capacity</span>'   : ''}
      ${showFloor    ? '<span>Location</span>'   : ''}
    `;
  }

  function renderBoard(classrooms) {
    const showAge      = cfg.showAgeGroup !== false;
    const showFloor    = cfg.showFloor    !== false;
    const showCapacity = !!cfg.showCapacity;

    const container = document.getElementById('rows');
    container.innerHTML = '';
    classrooms.forEach(c => {
      const row = document.createElement('div');
      row.className = 'row';
      const st = ['open', 'closed', 'full'].includes(c.status) ? c.status : 'closed';
      const capText = (c.checkedIn !== undefined && c.capacity)
        ? `${esc(c.checkedIn)} / ${esc(c.capacity)}` : (c.capacity ? `— / ${esc(c.capacity)}` : '—');
      row.innerHTML = `
        <div class="cell"><span class="badge ${st}">${esc(c.status)}</span></div>
        <div class="cell name">${esc(c.name)}</div>
        ${showAge      ? `<div class="cell age">${esc(c.age)}</div>`   : ''}
        ${showCapacity ? `<div class="cell floor">${capText}</div>`     : ''}
        ${showFloor    ? `<div class="cell floor">${esc(c.floor)}</div>` : ''}
      `;
      container.appendChild(row);
    });

    // Sync column widths
    rebuildHeaders(cfg);

    const openCount = classrooms.filter(c => c.status === 'open').length;
    document.getElementById('open-count').textContent = `${openCount} of ${classrooms.length} rooms open`;
  }

  let lastLogoState = null; // track whether custom logo was applied

  async function fetchStatus() {
    try {
      const res = await fetch('/api/status', { cache: 'no-store' });
      renderBoard(await res.json());
    } catch (e) {}
  }

  async function fetchConfig() {
    try {
      const res = await fetch('/api/config', { cache: 'no-store' });
      const latestCfg = await res.json();
      applyConfig(latestCfg);
      // Swap logo if state changed
      const img = document.getElementById('board-logo');
      if (img) {
        if (latestCfg.hasCustomLogo && lastLogoState !== true) {
          img.src = `/custom-logo.png?t=${Date.now()}`;
          lastLogoState = true;
        } else if (!latestCfg.hasCustomLogo && lastLogoState === true) {
          img.src = '/default-logo.png';
          lastLogoState = false;
        }
      }
    } catch (e) {}
  }

  async function init() {
    try {
      const [cfgRes, stateRes] = await Promise.all([fetch('/api/config'), fetch('/api/status')]);
      const initialCfg = await cfgRes.json();
      applyConfig(initialCfg);
      renderBoard(await stateRes.json());
      // Swap to custom logo if uploaded
      if (initialCfg.hasCustomLogo) {
        const img = document.getElementById('board-logo');
        if (img) img.src = `/custom-logo.png?t=${Date.now()}`;
        lastLogoState = true;
      } else {
        lastLogoState = false;
      }
      // Poll config every 10 seconds so name/branding changes appear without reload
      setInterval(fetchConfig, 10000);
    } catch (e) {}
  }

  init();

  // Live clock
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    document.getElementById('clock').textContent = `${h}:${m}`;
    const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    document.getElementById('date-str').textContent = `${days[now.getDay()]} · ${months[now.getMonth()]} ${now.getDate()}`;
  }
  updateClock();
  setInterval(updateClock, 10000);
</script>

</body>
</html>
